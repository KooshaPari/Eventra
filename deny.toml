# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []

[advisories]
# Deny all known security vulnerabilities
version = 2
ignore = []

[licenses]
version = 2
# Accept OSI-approved permissive and copyleft licenses common in the Rust ecosystem
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
]

[bans]
# Deny duplicate versions of the same crate (enforce deduplication in Cargo.lock)
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
