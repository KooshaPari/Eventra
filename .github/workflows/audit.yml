name: Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: Cargo audit (rustsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: rustsec/audit-check@69361f4c6cee81593d1f8db7f211e6312d330eaa
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Audit npm dependencies
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
            npm audit --audit-level=moderate
          else
            echo "No package-lock.json found; skipping npm audit."
          fi

  pip-audit:
    name: pip audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Python
        uses: actions/setup-python@a26af69b477792caf8d8f6cbe2c267b5e7b1e3b5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit Python dependencies
        if: ${{ hashFiles('**/requirements*.txt') != '' || hashFiles('**/pyproject.toml') != '' || hashFiles('**/Pipfile.lock') != '' }}
        run: |
          set +e
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip-audit -r pyproject.toml
          elif [ -f Pipfile.lock ]; then
            pip-audit -r Pipfile.lock
          fi
          echo "pip-audit finished (non-blocking)."
