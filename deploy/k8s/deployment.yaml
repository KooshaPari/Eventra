apiVersion: v1
kind: ConfigMap
metadata:
  name: eventkit-config
data:
  RUST_LOG: "info,eventkit=debug,eventkit_obs=debug"
  EVENTKIT_LOG_FORMAT: "plain"
  EVENTKIT_HEALTH_PORT: "8080"
  EVENTKIT_HEALTHCHECK_TIMEOUT_MS: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventkit-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eventkit-health
  template:
    metadata:
      labels:
        app: eventkit-health
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: eventkit-health
          image: eventra/eventkit:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: eventkit-config
          livenessProbe:
            exec:
              command: ["eventkit-healthcheck"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: eventkit-health
spec:
  selector:
    app: eventkit-health
  ports:
    - port: 8080
      targetPort: 8080
